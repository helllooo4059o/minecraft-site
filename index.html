<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Mini Game</title>
<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.top{
width:320px;
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.game{
display:grid;
grid-template-columns:repeat(4,80px);
grid-template-rows:repeat(4,80px);
gap:5px;
}

.block{
width:80px;
height:80px;
background:#2d2d2d;
border:2px solid #3aa655;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.block.active{
background:#3aa655;
}

.panel{
margin-top:15px;
width:320px;
display:flex;
justify-content:space-between;
}

button{
background:#3aa655;
border:none;
color:#fff;
padding:8px 12px;
cursor:pointer;
font-family:monospace;
}

button:hover{
background:#2e8744;
}

.credit{
margin-top:10px;
font-size:12px;
opacity:0.6;
}
</style>
</head>
<body>

<div class="top">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">30</span></div>
</div>

<div class="game" id="game"></div>

<div class="panel">
<button onclick="startGame()">Start</button>
<button onclick="resetGame()">Reset</button>
</div>

<div class="credit">Credit: JINE</div>

<script>
let score = 0;
let time = 30;
let running = false;
let timer;
let activeBlock = -1;

const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

for(let i=0;i<16;i++){
let div = document.createElement("div");
div.className="block";
div.onclick=()=>hit(i);
game.appendChild(div);
}

const blocks = document.querySelectorAll(".block");

function randomBlock(){
blocks.forEach(b=>b.classList.remove("active"));
activeBlock = Math.floor(Math.random()*16);
blocks[activeBlock].classList.add("active");
}

function hit(i){
if(!running) return;
if(i === activeBlock){
score++;
scoreEl.textContent = score;
randomBlock();
}
}

function startGame(){
if(running) return;
running = true;
score = 0;
time = 30;
scoreEl.textContent = score;
timeEl.textContent = time;
randomBlock();

timer = setInterval(()=>{
time--;
timeEl.textContent = time;
if(time <= 0){
clearInterval(timer);
running = false;
blocks.forEach(b=>b.classList.remove("active"));
}
},1000);
}

function resetGame(){
clearInterval(timer);
running = false;
score = 0;
time = 30;
scoreEl.textContent = score;
timeEl.textContent = time;
blocks.forEach(b=>b.classList.remove("active"));
}
</script>

</body>
</html>
