<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Profile</title>
<style>
body{
margin:0;
background:#0f0f0f;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.window{
width:420px;
background:#1b1b1b;
border:3px solid #3aa655;
box-shadow:0 0 20px rgba(58,166,85,0.4);
padding:15px;
position:relative;
overflow:hidden;
}

.title{
text-align:center;
font-size:18px;
margin-bottom:10px;
letter-spacing:2px;
border-bottom:1px solid #3aa655;
padding-bottom:8px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.slot{
background:#2a2a2a;
border:1px solid #3aa655;
padding:8px;
font-size:12px;
}

.full{
grid-column:span 2;
}

.player{
background:#2a2a2a;
border:1px solid #3aa655;
padding:8px;
text-align:center;
cursor:pointer;
position:relative;
}

.status{
margin-top:10px;
padding:8px;
background:#2a2a2a;
border:1px solid #3aa655;
text-align:center;
}

.sky{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:18px;
transition:top 0.1s linear;
}

.ground{
position:absolute;
bottom:0;
left:0;
width:100%;
height:20px;
background:#333;
}

.footer{
margin-top:10px;
text-align:center;
font-size:12px;
opacity:0.7;
}

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(5px,0);}
50%{transform:translate(-5px,0);}
75%{transform:translate(5px,0);}
100%{transform:translate(0,0);}
}
</style>
</head>
<body>

<div class="window" id="window">

<div class="title">⛏ MINECRAFT PROFILE</div>

<div class="grid">

<div class="player" onclick="startFall()" id="steve">Steve</div>
<div class="slot">Pronouns: he/him</div>

<div class="slot">Mode: Survival</div>
<div class="slot">Difficulty: Hardcore (on accident)</div>

<div class="slot full">Main Goal: not fall into lava (fails)</div>
<div class="slot full">Focus: mining straight down (bad idea)</div>
<div class="slot full">Playstyle: accidental speedrunner to death</div>

</div>

<div class="status" id="status">Status: alive</div>

<div class="footer">Credit: JINE</div>

<div class="ground"></div>
</div>

<script>
let falling = false;
let pos = 0;
let speed = 2;
let interval;

function startFall(){
if(falling) return;
falling = true;

const steve = document.getElementById("steve");
const windowBox = document.getElementById("window");
const status = document.getElementById("status");

const fallObj = document.createElement("div");
fallObj.textContent = "Steve";
fallObj.className = "sky";
windowBox.appendChild(fallObj);

pos = 0;
speed = 2;

interval = setInterval(()=>{
pos += speed;
speed += 0.4;

fallObj.style.top = pos + "px";

if(pos >= 260){
clearInterval(interval);

windowBox.classList.add("shake");

status.textContent = "Status: died from fall damage 💀";

setTimeout(()=>{
windowBox.classList.remove("shake");
fallObj.remove();
falling = false;
},800);
}
},20);
}
</script>

</body>
</html>
